<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Card — Article</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #060d26 0%, #0b1840 50%, #10225a 100%);
      position: relative;
      overflow: hidden;
    }

    /* Background glows */
    .glow-tl {
      position: absolute; top: -100px; left: -60px;
      width: 480px; height: 480px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.26) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Top accent bar */
    .accent-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #2563eb 0%, #818cf8 55%, transparent 100%);
    }

    /* Layout */
    .layout {
      position: absolute; inset: 0;
      display: flex;
    }

    /* Left content column */
    .left {
      width: 620px;
      flex-shrink: 0;
      padding: 52px 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    /* Logo row */
    .logo-row { display: flex; align-items: center; gap: 12px; }
    .logo-img { height: 72px; width: auto; }
    .logo-name { font-size: 32px; font-weight: 700; color: rgba(255,255,255,.88); letter-spacing: -.01em; }

    /* Middle */
    .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 28px 0 20px; }
    .category {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
      color: #93c5fd; background: rgba(37,99,235,.22);
      border: 1px solid rgba(37,99,235,.38); border-radius: 6px;
      padding: 5px 12px; margin-bottom: 22px; width: fit-content;
    }
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; flex-shrink: 0; }
    .title {
      font-size: 40px; font-weight: 900; color: #ffffff;
      letter-spacing: -.03em; line-height: 1.1;
    }

    /* Author row */
    .author-row {
      display: flex; align-items: center; gap: 14px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .author-avatar {
      width: 62px; height: 62px; border-radius: 50%;
      object-fit: cover; object-position: center 10%;
      border: 2px solid rgba(255,255,255,.20); flex-shrink: 0;
    }
    .author-name { font-size: 20px; font-weight: 700; color: rgba(255,255,255,.90); margin-bottom: 4px; }
    .author-meta { font-size: 17px; color: rgba(255,255,255,.44); }

    /* Right: data viz canvas */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* Left fade so canvas blends into the background */
    .right-fade {
      position: absolute; top: 0; left: 0; bottom: 0; width: 120px;
      background: linear-gradient(to right, #0b1840, transparent);
      z-index: 2;
      pointer-events: none;
    }

    /* Domain */
    .domain {
      position: absolute; bottom: 22px; right: 28px;
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,.25); letter-spacing: .05em; z-index: 3;
    }
  </style>
</head>
<body>

  <div class="glow-tl"></div>
  <div class="accent-bar"></div>

  <div class="layout">

    <div class="left">
      <div class="logo-row">
        <img src="primex-logo.png" alt="Primex Systems" class="logo-img" />
        <span class="logo-name">Primex Systems</span>
      </div>
      <div class="middle">
        <div class="category"><span class="cat-dot"></span>Risk Adjustment &amp; VBC</div>
        <h1 class="title">V28 did not break your risk scores. Your documentation did.</h1>
      </div>
      <div class="author-row">
        <img src="ajay-headshot-3.png" alt="Ajay Chaudhary" class="author-avatar" />
        <div>
          <div class="author-name">Ajay Chaudhary</div>
          <div class="author-meta">Founder &amp; Principal Consultant · Jul 9, 2026 · 13 min read</div>
        </div>
      </div>
    </div>

    <div class="right">
      <canvas id="viz"></canvas>
      <div class="right-fade"></div>
      <div class="domain">primexsystems.org</div>
    </div>

  </div>

<script>
  const canvas = document.getElementById('viz');
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width = W * 2;
  canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // Node definitions — positions as fractions of canvas size
  const nodes = [
    // Core hub nodes (larger)
    { x: .38, y: .50, r: 14, label: 'EDI',     bright: true  },
    { x: .62, y: .28, r: 13, label: 'FHIR',    bright: true  },
    { x: .72, y: .65, r: 12, label: 'Claims',  bright: true  },
    // Secondary nodes
    { x: .18, y: .32, r:  8, label: '837',     bright: false },
    { x: .22, y: .72, r:  8, label: '835',     bright: false },
    { x: .50, y: .14, r:  7, label: 'R4',      bright: false },
    { x: .82, y: .18, r:  7, label: 'PA',      bright: false },
    { x: .88, y: .52, r:  8, label: 'Eligib.', bright: false },
    { x: .78, y: .84, r:  7, label: 'Auth',    bright: false },
    { x: .52, y: .82, r:  6, label: '278',     bright: false },
    { x: .30, y: .88, r:  6, label: '271',     bright: false },
    { x: .08, y: .55, r:  6, label: 'ERA',     bright: false },
    { x: .96, y: .36, r:  5, label: 'CMS',     bright: false },
    { x: .60, y: .52, r:  5, label: 'API',     bright: false },
    { x: .44, y: .36, r:  5, label: 'NPI',     bright: false },
  ];

  // Edges: pairs of node indices
  const edges = [
    [0,1],[0,2],[0,3],[0,4],[0,10],[0,11],[0,13],
    [1,5],[1,6],[1,13],[1,14],
    [2,7],[2,8],[2,9],[2,13],
    [3,11],[4,10],[5,6],[6,12],[7,8],[8,9],[9,10],[14,13],
  ];

  // Convert fractions to pixels
  const px = nodes.map(n => ({ ...n, px: n.x * W, py: n.y * H }));

  // Draw edges
  edges.forEach(([a, b]) => {
    const na = px[a], nb = px[b];
    const grad = ctx.createLinearGradient(na.px, na.py, nb.px, nb.py);
    grad.addColorStop(0, 'rgba(37,99,235,.55)');
    grad.addColorStop(1, 'rgba(129,140,248,.25)');
    ctx.beginPath();
    ctx.moveTo(na.px, na.py);
    ctx.lineTo(nb.px, nb.py);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  });

  // Draw nodes
  px.forEach(n => {
    // Outer glow ring
    const glow = ctx.createRadialGradient(n.px, n.py, n.r * .4, n.px, n.py, n.r * 2.8);
    glow.addColorStop(0, n.bright ? 'rgba(37,99,235,.35)' : 'rgba(37,99,235,.18)');
    glow.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.beginPath();
    ctx.arc(n.px, n.py, n.r * 2.8, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Node fill
    const fill = ctx.createRadialGradient(n.px - n.r * .3, n.py - n.r * .3, 0, n.px, n.py, n.r);
    fill.addColorStop(0, n.bright ? '#4f86f7' : '#2d5fd4');
    fill.addColorStop(1, n.bright ? '#1d4ed8' : '#1a3aa8');
    ctx.beginPath();
    ctx.arc(n.px, n.py, n.r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();

    // Node border
    ctx.beginPath();
    ctx.arc(n.px, n.py, n.r, 0, Math.PI * 2);
    ctx.strokeStyle = n.bright ? 'rgba(147,197,253,.70)' : 'rgba(147,197,253,.35)';
    ctx.lineWidth = n.bright ? 1.8 : 1.2;
    ctx.stroke();

    // Label
    ctx.font = `${n.bright ? 700 : 600} ${n.bright ? 10 : 9}px Inter, system-ui, sans-serif`;
    ctx.fillStyle = n.bright ? 'rgba(255,255,255,.95)' : 'rgba(255,255,255,.75)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, n.px, n.py);
  });
</script>

</body>
</html>
