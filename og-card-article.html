<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Card — Article</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #080f2a 0%, #0d1c4a 50%, #132260 100%);
      position: relative;
      overflow: hidden;
    }

    /* Background glow accents */
    .glow-tl {
      position: absolute; top: -80px; left: -80px;
      width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.30) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-br {
      position: absolute; bottom: -120px; right: 360px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Top accent bar */
    .accent-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #2563eb 0%, #818cf8 60%, transparent 100%);
    }

    /* Layout */
    .layout {
      position: absolute; inset: 0;
      display: flex;
    }

    /* Left content column */
    .left {
      flex: 1;
      padding: 52px 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-img {
      height: 36px;
      width: auto;
    }
    .logo-name {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,.90);
      letter-spacing: -.01em;
    }

    /* Middle: category + title */
    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 0 24px;
    }
    .category {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: #93c5fd;
      background: rgba(37,99,235,.22);
      border: 1px solid rgba(37,99,235,.38);
      border-radius: 6px;
      padding: 5px 12px;
      margin-bottom: 22px;
      width: fit-content;
    }
    .cat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #60a5fa; flex-shrink: 0;
    }
    .title {
      font-size: 42px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -.03em;
      line-height: 1.1;
      text-wrap: balance;
    }

    /* Bottom: author */
    .author-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .author-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; object-position: center 10%;
      border: 2px solid rgba(255,255,255,.20);
      flex-shrink: 0;
    }
    .author-name {
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,.90);
      margin-bottom: 3px;
    }
    .author-meta {
      font-size: 13px;
      color: rgba(255,255,255,.45);
    }

    /* Right: photo column */
    .right {
      width: 380px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      top: 0; right: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 12%;
    }
    /* Fade from left */
    .photo-fade {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 160px;
      background: linear-gradient(to right, #0d1c4a, transparent);
      z-index: 1;
    }
    /* Domain watermark */
    .domain {
      position: absolute;
      bottom: 22px; right: 28px;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,.28);
      letter-spacing: .04em;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="accent-bar"></div>

  <div class="layout">
    <div class="left">

      <div class="logo-row">
        <img src="primex-logo.png" alt="Primex Systems" class="logo-img" />
        <span class="logo-name">Primex Systems</span>
      </div>

      <div class="middle">
        <div class="category">
          <span class="cat-dot"></span>
          Data &amp; AI Strategy
        </div>
        <h1 class="title">Your AI Problem Is Probably a Data Problem</h1>
      </div>

      <div class="author-row">
        <img src="ajay-headshot-3.png" alt="Ajay Chaudhary" class="author-avatar" />
        <div>
          <div class="author-name">Ajay Chaudhary</div>
          <div class="author-meta">Founder &amp; Principal Consultant · Jul 2, 2026 · 8 min read</div>
        </div>
      </div>

    </div>

    <div class="right">
      <img src="ajay-headshot-3.png" alt="" class="photo" />
      <div class="photo-fade"></div>
      <div class="domain">primexsystems.org</div>
    </div>
  </div>

</body>
</html>
